name: Build apps

# Builds the installers in the cloud (no local toolchain needed) and signs the
# auto-update artifacts.
#
# - "Run workflow" button (Actions tab) → builds both installers and uploads each as a
#   downloadable artifact on the run page (no Release created).
# - Pushing a version tag like v0.2.2 → publishes a public GitHub Release with the
#   Windows (.exe) + macOS (.dmg) installers AND the signed updater artifacts +
#   `latest.json` that the in-app auto-updater reads.
#
# Requires repo secret TAURI_SIGNING_PRIVATE_KEY (the updater private key). The key has
# no password, so TAURI_SIGNING_PRIVATE_KEY_PASSWORD is an empty string below.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write # needed to create the Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: "--bundles nsis"
            artifact_glob: src-tauri/target/release/bundle/nsis/*-setup.exe
            artifact_name: focusbox-windows-installer
          - os: macos-latest
            # `app` is required so createUpdaterArtifacts emits the macOS .app.tar.gz
            # updater bundle; `dmg` is the human download.
            args: "--bundles app,dmg"
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
            artifact_name: focusbox-macos-dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build (+ publish Release on tag) with signed updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          # Only release on a tag push; a manual run just builds (tagName empty → no release).
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Focusbox ${{ github.ref_name }}"
          releaseBody: |
            Focusbox — minimal countdown timer + tasks + notes.

            **Windows 11:** download the `*-setup.exe` and run it. SmartScreen may
            warn the first time → **More info → Run anyway** (unsigned, not unsafe).
            WebView2 is already built into Windows 11.

            **macOS (Apple Silicon):** download the `.dmg`, drag Focusbox to
            Applications. The app is unsigned, so the first launch needs a
            right-click → **Open** (or run `xattr -cr /Applications/Focusbox.app`).

            Once installed, Focusbox keeps itself up to date — it checks on launch and
            offers a one-click "restart to update".
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Upload installer artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
