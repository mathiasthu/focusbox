name: Build Windows app

# Builds the Windows installer in the cloud (no Windows machine needed).
#
# - "Run workflow" button (Actions tab) → builds and uploads the installer as a
#   downloadable artifact on the run page.
# - Pushing a version tag like v0.1.0 → also publishes a public GitHub Release
#   with the installer attached, giving a clean download link to share.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # needed to create the Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (NSIS installer)
        run: npm run tauri build -- --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: focusbox-windows-installer
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 (2.x)
        with:
          files: src-tauri/target/release/bundle/nsis/*-setup.exe
          body: |
            Focusbox for Windows 11.

            Download the `*-setup.exe` below and run it. Windows SmartScreen may
            show a "Windows protected your PC" warning the first time — click
            **More info → Run anyway** (the app is just unsigned, not unsafe).
